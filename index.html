<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厨房注文システム</title>

    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; text-align: center; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        button { padding: 15px 25px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 8px; }
        .btn-order { background: #4CAF50; color: white; width: 80%; }
        .btn-kitchen { background: #2196F3; color: white; width: 80%; }
        .btn-back { background: #9e9e9e; color: white; }
        .menu-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .menu-item { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 150px; cursor: pointer; }
        .kitchen-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .order-card { background: white; border-top: 8px solid #ff5722; padding: 15px; border-radius: 5px; width: 250px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .history-card { background: #eee; border-top: 4px solid #9e9e9e; padding: 10px; border-radius: 5px; width: 200px; text-align: left; opacity: 0.7; font-size: 14px; }
        .order-no { font-weight: bold; font-size: 18px; border-bottom: 1px dashed #ccc; margin-bottom: 5px; }

        /*注文画面全体のレイアウト*/
        .order-container {
            display: flex;
            /* 画面の高さからヘッダー分などを引いた高さにする */
            height: calc(100vh - 200px);
            padding: 0;
            gap: 0;
        }

        /*左側：メニューエリア*/
        .menu-section {
            flex: 2px;
            overflow-y: auto; /* メニューが多い時にスクロール可能に */
            padding-top: 15px; /* 上の余白を最小限に */
        }

        /*右側：注文内容エリア*/
        .cart-section {
            flex: 1; /* 3分の１くらいの幅 */
            max-width: 350px;
            background: #fff;
            border: 1px solid #ddd; /* 左側だけでなく全方位に枠線を引く */
            border-radius: 10px; /* 角を丸くする */
            display: flex;
            flex-direction: column;
            height: 100%; /* 親要素の高さに合わせる */
            margin-right: 10px; /* 右側に少し隙間を作る */
        }

        /*カテゴリーボタンのエリアの余白を詰める*/
        #order-screen h2 {
            margin-bottom: 10px;
        }

        /* カテゴリーを横一列に並べ、はみ出したらスクロールさせる */
        .category-box {
            display: flex;
            overflow-x: auto;  /* 横スクロールを許可 */
            white-space: nowrap;  /* 改行させない */
            gap: 10px;
            padding: 10px;
            background: #fff;
            -webkit-overflow-scrolling: touch; /* iPhone/iPadでのスクロールを滑らかに　*/
        }

        /* スクロールバーを非表示にする */
        .category-box::-webkit-scrollbar {
            display: none;
        }

        .cart-items {
            flex-grow: 1;
            padding: 15px;
            text-align: left;
            overflow-y: auto;
        }

        .total-area {
            background: #f9f9f9;
            padding: 20px;
            border-top: 1px solid #ddd;
        }

        .cart-items div:hover {
            background-color: #ffebee;
        }
    </style>
</head>
<body>

    <section id="home-screen" class="screen active">
        <h1>注文システム</h1>
        <button class="btn-order" onclick="showScreen('order-screen')">注文を送信する</button><br>
        <button class="btn-kitchen" onclick="showScreen('kitchen-screen')">注文を表示する</button>
        <button class="btm-kitchen" onclick="showScreen('history-screen')">注文履歴を見る</button>
       
    </section>

    <section id="order-screen" class="screen" style="padding: 0;">
        <h2 style="margin: 10px 0;">メニュー選択</h2>

        <div class="category-box">
            <button onclick="filterMenu('all')" style="background:#607d8b; color:white; flex-shrink: 0;">すべて</button>
            <button onclick="filterMenu('ra-men')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">ラーメン</button>
            <button onclick="filterMenu('cha-han')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">チャーハン</button>
            <button onclick="filterMenu('set')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">定食</button>
            <button onclick="filterMenu('ra-menTopping')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">ラーメントッピング</button>
            <button onclick="filterMenu('cha-hanTopping')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">チャーハントッピング</button>
            <button onclick="filterMenu('flavorChange')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">味変</button>
            <button onclick="filterMenu('softDrinks')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">ソフトドリンク</button>
            <button onclick="filterMenu('alcohol')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">アルコール</button>
            <button onclick="filterMenu('takeOut')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">持ち帰り</button>
            <button onclick="filterMenu('others')" style="font-size: 14px; background:#607d8b; color:white; flex-shrink: 0;">その他</button>
        </div>

        <div class="order-container">
            <div class="menu-section">
                <div class="menu-grid" id="menu-container"></div>
                <button class="btn-back" onclick="showScreen('home-screen')" style="margin-top: 50px;">ホームへ戻る</button>
            </div>

            <div class="cart-section">
                <div style="padding: 15px; border-bottom: 1px solid #eee; font-weight: bold;">注文リスト</div>
                <div id="cart-display" class="cart-items">
                    なし
                </div>

                <div class="total-area" style="padding: 10px 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span>合計</span>
                        <span><span id="total-price" style="font-size: 24px; color: #e91e63;">0</span> 円</span>
                    </div>
                    <button class="btn-order" onclick="sendOrderToFirebase()" style="width: 100%; height: 50px; margin: 0;">注文確定</button>
                </div>
            </div>
        </div>
    </section>

    <section id="kitchen-screen" class="screen">
        <h2>🍳 厨房モニター（調理待ち）</h2>
        <div id="kitchen-orders" class="kitchen-grid"></div>
        <button class="btn-back" onclick="showScreen('home-screen')" style="margin-top: 30px;">ホームへ戻る</button>
    </section>

    <section id="history-screen" class="screen">
        <h2>注文履歴</h2>
        <div id="home-history" class="kitchen-grid"></div>
        <button class="btn-back" onclick="showScreen('home-screen')" style="margin-top: 30px;">ホームへ戻る</button>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ★★★ ここをあなたのFirebase設定に書き換えてください ★★★
        const firebaseConfig = {
           apiKey: "AIzaSyC39AdMEGzrMlwDVtGqYxGC6MI8vW3wD7k",
           authDomain: "cash-system-574e9.firebaseapp.com",
           databaseURL: "https://cash-system-574e9-default-rtdb.asia-southeast1.firebasedatabase.app",
           projectId: "cash-system-574e9",
           storageBucket: "cash-system-574e9.firebasestorage.app",
           messagingSenderId: "510943732907",
           appId: "1:510943732907:web:d73fb867a5337637be43ee",
           measurementId: "G-2WECDF7DD8"
         };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        //メニューに「価格」を追加
        const menuData = [
            {name: 'ラーメン', category: 'all', category:'ra-men', price: 960}
            //To Do メニュー追加
            //新しくメニューを増やしたいときは上のコードを貼り付ける（名前、カテゴリ、値段は変える）
        ]

        //メニューを表示する関数
        window.renderMenu = (category = 'all') => {
            const container = document.getElementById('menu-container');
            if (!container) return;
            container.innerHTML = "";
            const filtered = category === 'all' ? menuData : menuData.filter(item => item.category === category);
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.onclick = () => addToCart(item.name, item.price); //ここで　addToCartを使う
                div.innerHTML = `${item.name}<br><small>${item.price}円</small>`;
                container.appendChild(div);
            });
        };
        //カテゴリー絞り込み関数
        window.filterMenu = (category) => {
            renderMenu(category);
        };

        //初回実行(ページを開いた瞬間にメニューを出す)
        renderMenu();

        let cart = {};

        //商品を選んだ時の処理
        window.addToCart = (name, price) => {
            if (cart[name]) {
                cart[name].count++;
            } else {
                cart[name] = {price: price, count: 1};
            }
            updateCartDisplay();
        };

        //+ボタン用
        window.increaseCount = (name) => {
            cart[name].count++;
            updateCartDisplay();
        };

        //-ボタン用
        window.decreaseCount = (name) => {
            if (cart[name].count > 1) {
                cart[name].count--;
            } else {
                delete cart[name]; //1個の時に減らしたらリストから消す
            }
            updateCartDisplay();
        };

        //右側の注文リストと金額を更新
        function updateCartDisplay() {
            const display = document.getElementById('cart-display');
            const totalDisplay = document.getElementById('total-price')
            const names = Object.keys(cart);

            if (names.length === 0) {
                display.innerText = "なし";
                totalDisplay.innerText = "0"
                return;
            }

            //リストの表示:クリックで消す機能
            display.innerHTML = names.map(name => `
                <div style="desplay:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #eee">
                    <div>${name} (${cart[name].price}円)</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button onclick="decreaseCount('${name}')" style="padding:2px 8px; margin:0">-</button>
                        <span style="font-weight:bold; min-width:20px; text-align:center;">${cart[name].count}</span>
                        <button onclick="increaseCount('${name}')" style="padding:2px 8px; margin:0;">+</button>
                    </div>
                </div>
            `).join('');

        //カートから特定の項目を削除する関数
        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCartDisplay();
        };
                

            //　合計金額の計算
            let total = 0;
            names.forEach(name => {
                total += cart[name].price * cart[name].count;
            });
            totalDisplay.innerText = total.toLocaleString(); //カンマ区切りにする
        }

        // メニューを表示する関数（価格も渡すように変更）
        window.renderMenu = (category = 'all') => {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            const filtered = category === 'all' ? menuData : menuData.filter(item => item.category === category);
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.onclick = () => addToCart(item.name, item.price);
                div.innerHTML = `${item.name}<br><small>${item.price}円</small>`;
                container.appendChild(div);
            });
        };

        //注文送信関数
        window.sendOrderToFirebase = () => {
            const names = Object.keys(cart);
            if (names.length === 0) return alert("商品を選んでください");

            //厨房用に商品を重ねないようにする（ラーメン×２ → ["ラーメン","ラーメン"]）
            let itemsForKitchen = [];
            let total = 0;
            names.forEach(name => {
                for (let i = 0; i < cart[name].count; i++) {
                    itemsForKitchen.push(name);
                }
                total += cart[name].price * cart[name].count;
            });

            const newOrder = {
                orderNo: Math.floor(100 + Math.random() * 900),
                items: itemsForKitchen, //ここでバラバラのリストを渡す
                totalPrice: total,
                doneItems: itemsForKitchen.map(() => false), // 商品ごとの完了状態
                timestamp: Date.now(),
                time: new Date().toLocaleTimeString(),
                pass:'grs-37195-Xnjt'
            };
            //送信処理
            push(ref(db, 'orders'), newOrder);
            alert("送信しました");
            cart = {};
            updateCartDisplay();
            showScreen('home-screen');
        };

        // 商品の取り消し線切り替え
        window.toggleItem = (orderKey, index, status) => {
            const updates = {};
            updates[`orders/${orderKey}/doneItems/${index}`] = !status;
            update(ref(db), updates);
        };

        // リアルタイム更新
        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const kitchenDiv = document.getElementById('kitchen-orders');
            const homeHistoryDiv = document.getElementById('home-history');
            kitchenDiv.innerHTML = "";
            if (homeHistoryDiv) homeHistoryDiv.innerHTML = "";

            if (data) {
                const now = Date.now();
                // データを新しい順に並べる（任意）
                Object.keys(data).reverse().forEach(key => {
                    const order = data[key];
                    if (now - order.timestamp > 24 * 60 * 60 * 1000) return;

                    const allDone = order.doneItems && order.doneItems.every(status => status === true);
                    
                    let itemsHtml = "";
                    order.items.forEach((item, i) => {
                        const isDone = order.doneItems && order.doneItems[i];
                        
                        // 厨房(allDoneでない時)だけ線を表示、履歴(allDoneの時)は線を表示しない
                        const itemStyle = (!allDone && isDone) ? "text-decoration:line-through; color:#ccc;" : "text-decoration:none; color:#000;";
                        

                        // 厨房画面のみクリック可能にする
                        const clickAttr = !allDone ? `onclick="toggleItem('${key}', ${i}, ${isDone})"` : "";
                        
                        itemsHtml += `<div ${clickAttr} style="cursor:pointer; ${itemStyle}">・${item}</div>`;
                    });

                    const cardHtml = `
                        <div class="${allDone ? 'history-card' : 'order-card'}" style="opacity:1;">
                            <div class="order-no">#${order.orderNo} <span style="font-size:10px;">${order.time}</span></div>
                            <div>${itemsHtml}</div>
                            <div style="argin-top:10px; font-weitht:bold; border-top:1px solid #eee; padding-top:5px">
                                合計: ${order.totalPrice ? order.totalPrice.toLocaleString() : 0} 円    
                            </div>
                            ${allDone ? '<p style="color:blue; font-size:12px; margin-top:5px;">提供完了済み</p>' : ''}
                        </div>
                    `;

                    if (allDone) {
                        homeHistoryDiv.insertAdjacentHTML('beforeend', cardHtml);
                    } else {
                        kitchenDiv.insertAdjacentHTML('beforeend', cardHtml);
                    }
                });
            }
        });
    </script>
</body>
</html>
